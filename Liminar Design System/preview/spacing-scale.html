<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px">
  <div style="display:flex;flex-direction:column;gap:14px">
    <div style="display:grid;grid-template-columns:60px 1fr;gap:18px;align-items:center">
      <span class="swatch-hex">24px</span>
      <div style="height:24px;background:rgba(27,68,227,0.16);border-left:2px solid #1B44E3"></div>
    </div>
    <div style="display:grid;grid-template-columns:60px 1fr;gap:18px;align-items:center">
      <span class="swatch-hex">40px</span>
      <div style="height:40px;background:rgba(27,68,227,0.16);border-left:2px solid #1B44E3;width:80%"></div>
    </div>
    <div style="display:grid;grid-template-columns:60px 1fr;gap:18px;align-items:center">
      <span class="swatch-hex">64px</span>
      <div style="height:64px;background:rgba(27,68,227,0.16);border-left:2px solid #1B44E3;width:60%"></div>
    </div>
    <div style="display:grid;grid-template-columns:60px 1fr;gap:18px;align-items:center">
      <span class="swatch-hex">112px · section</span>
      <div style="height:112px;background:rgba(27,68,227,0.16);border-left:2px solid #1B44E3;width:40%"></div>
    </div>
  </div>
  <p style="margin-top:14px;font-family:'Inter',sans-serif;font-size:12px;line-height:1.6;color:#85858E">
    8px base. Sections breathe at 112px. Hero & CTA at 128px. Generous editorial rhythm.
  </p>
</body></html>
