<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="grid-4">
    <div class="swatch">
      <div class="swatch-chip" style="background:#1B44E3"></div>
      <div class="swatch-meta"><span class="swatch-name">Cobalt</span><span class="swatch-hex">#1B44E3 · --accent</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#0F30C2"></div>
      <div class="swatch-meta"><span class="swatch-name">Cobalt press</span><span class="swatch-hex">#0F30C2</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#BDC8F5"></div>
      <div class="swatch-meta"><span class="swatch-name">Cobalt soft</span><span class="swatch-hex">#BDC8F5 · on dark</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#0C0C10"></div>
      <div class="swatch-meta"><span class="swatch-name">Deep ink</span><span class="swatch-hex">#0C0C10 · --bg-deep</span></div>
    </div>
  </div>
  <p style="margin-top:18px;font-family:'Inter',sans-serif;font-size:12px;line-height:1.6;color:#85858E;max-width:560px">
    Cobalt is the only highlight color. No green for success, red for error, or orange for warning. Italics + presence/absence carry semantic weight.
  </p>
</body></html>
