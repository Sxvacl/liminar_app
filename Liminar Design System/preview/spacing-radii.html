<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px">
  <div style="display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:60px;border:1px solid rgba(15,15,20,0.26);border-radius:0;background:#F8F8F7"></div>
      <span class="swatch-hex">0 · cards</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:60px;border:1px solid rgba(15,15,20,0.26);border-radius:4px;background:#F8F8F7"></div>
      <span class="swatch-hex">4 · inputs</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="display:inline-flex;align-items:center;padding:10px 22px;border-radius:999px;background:#0F0F14;color:#F8F8F7;font-family:'Inter',sans-serif;font-size:13px;font-weight:500">Conversemos →</div>
      <span class="swatch-hex">999 · pills</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:14px;height:14px;border-radius:50%;background:#1B44E3"></div>
      <span class="swatch-hex">50% · dot</span>
    </div>
  </div>
  <p style="margin-top:14px;font-family:'Inter',sans-serif;font-size:12px;line-height:1.6;color:#85858E">
    Cards are sharp. Inputs and source-tags get 4px. Buttons are pills. The cobalt dot is the only round mark.
  </p>
</body></html>
