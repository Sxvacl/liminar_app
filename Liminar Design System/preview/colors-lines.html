<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="col" style="gap:18px">
    <div>
      <div class="eyebrow" style="margin-bottom:8px">Light mode hairlines</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="flex:1;height:1px;background:rgba(15,15,20,0.08)"></div>
          <span class="swatch-hex" style="white-space:nowrap">--line · rgba(15,15,20,.08)</span>
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <div style="flex:1;height:1px;background:rgba(15,15,20,0.26)"></div>
          <span class="swatch-hex" style="white-space:nowrap">--line-s · rgba(15,15,20,.26)</span>
        </div>
      </div>
    </div>
    <div style="background:#0C0C10;padding:18px;margin:0 -24px -24px;position:relative">
      <div class="eyebrow" style="margin-bottom:8px;color:rgba(248,248,247,.42)">Inverted hairlines</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="flex:1;height:1px;background:rgba(248,248,247,.06)"></div>
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(248,248,247,.42);white-space:nowrap;letter-spacing:.04em;text-transform:uppercase">--line-inv-soft</span>
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <div style="flex:1;height:1px;background:rgba(248,248,247,.10)"></div>
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(248,248,247,.42);white-space:nowrap;letter-spacing:.04em;text-transform:uppercase">--line-inv</span>
        </div>
      </div>
    </div>
  </div>
</body></html>
