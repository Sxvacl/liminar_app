<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="grid-5">
    <div class="swatch">
      <div class="swatch-chip" style="background:#F8F8F7"></div>
      <div class="swatch-meta"><span class="swatch-name">Paper</span><span class="swatch-hex">#F8F8F7 · --bg</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#EFEFEC"></div>
      <div class="swatch-meta"><span class="swatch-name">Paper 2</span><span class="swatch-hex">#EFEFEC · --bg2</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#85858E"></div>
      <div class="swatch-meta"><span class="swatch-name">Ink muted</span><span class="swatch-hex">#85858E · --ink-m</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#424248"></div>
      <div class="swatch-meta"><span class="swatch-name">Ink secondary</span><span class="swatch-hex">#424248 · --ink-s</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#0F0F14"></div>
      <div class="swatch-meta"><span class="swatch-name">Ink</span><span class="swatch-hex">#0F0F14 · --ink</span></div>
    </div>
  </div>
</body></html>
