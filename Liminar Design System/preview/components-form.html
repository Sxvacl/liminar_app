<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#85858E">Email</label>
      <input value="jose@empresa.cl" style="width:100%;padding:12px 16px;background:#F8F8F7;border:1px solid #1B44E3;border-radius:4px;font-family:'Inter',sans-serif;font-size:15px;color:#0F0F14;outline:none;box-shadow:0 0 0 3px rgba(27,68,227,0.10)"/>
      <span class="eyebrow" style="margin-top:2px;font-size:9px">Focus state · 1px accent + 3px ring</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#85858E">Empresa</label>
      <input placeholder="Inmobiliaria, estudio…" style="width:100%;padding:12px 16px;background:#F8F8F7;border:1px solid rgba(15,15,20,0.26);border-radius:4px;font-family:'Inter',sans-serif;font-size:15px;color:#85858E;outline:none"/>
      <span class="eyebrow" style="margin-top:2px;font-size:9px">Default · placeholder in ink-m</span>
    </div>
  </div>
  <div style="margin-top:14px">
    <div style="padding:14px 18px;border:1px solid #1B44E3;border-radius:4px;background:rgba(27,68,227,.06);font-family:'Inter',sans-serif;font-size:14px;color:#1B44E3">
      Recibido. Te contactamos en menos de 24 horas para coordinar.
    </div>
  </div>
</body></html>
