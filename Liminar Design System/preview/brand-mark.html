<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px">
  <div style="display:flex;align-items:center;gap:32px">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="display:inline-flex;align-items:center">
        <span style="width:30px;height:1.5px;background:#0F0F14;display:block"></span>
        <span style="width:7px;height:7px;border-radius:50%;background:#1B44E3;display:block;margin-left:-1px;animation:pulse 2.8s ease-in-out infinite"></span>
      </span>
      <span style="font-family:'Fraunces',serif;font-size:22px;font-weight:500;letter-spacing:-0.01em;color:#0F0F14">Liminar</span>
    </div>
    <div style="height:32px;width:1px;background:rgba(15,15,20,0.08)"></div>
    <div style="background:#0C0C10;padding:14px 18px;display:flex;align-items:center;gap:12px">
      <span style="display:inline-flex;align-items:center">
        <span style="width:30px;height:1.5px;background:#F8F8F7;display:block"></span>
        <span style="width:7px;height:7px;border-radius:50%;background:#1B44E3;display:block;margin-left:-1px"></span>
      </span>
      <span style="font-family:'Fraunces',serif;font-size:22px;font-weight:500;letter-spacing:-0.01em;color:#F8F8F7">Liminar</span>
    </div>
    <div style="display:flex;align-items:center">
      <span style="width:24px;height:1.2px;background:#0F0F14;display:block"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:#1B44E3;display:block;margin-left:-1px;animation:pulse 2.8s ease-in-out infinite"></span>
    </div>
  </div>
  <p style="margin-top:18px;font-family:'Inter',sans-serif;font-size:12px;line-height:1.6;color:#85858E">
    The mark is a 30×1.5px ink line + a 7×7px cobalt dot. Pulses at 2.8s. Inverts on dark — line becomes paper, dot stays cobalt.
  </p>
  <style>
    @keyframes pulse { 0%,100% {opacity:1;transform:scale(1)} 50% {opacity:.35;transform:scale(.65)} }
  </style>
</body></html>
