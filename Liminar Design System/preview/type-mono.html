<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:28px 24px">
  <div style="display:flex;flex-direction:column;gap:18px">
    <div>
      <div class="eyebrow" style="margin-bottom:8px">Section eyebrow · 11px / 0.06em</div>
      <div style="display:flex;align-items:center;gap:16px">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#85858E">01 / Diagnóstico</span>
        <span style="height:1px;width:56px;background:rgba(15,15,20,0.08)"></span>
      </div>
    </div>
    <div>
      <div class="eyebrow" style="margin-bottom:8px">Form label · 10px</div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#85858E">Empresa / Rubro</span>
    </div>
    <div>
      <div class="eyebrow" style="margin-bottom:8px">Source tag · in-product use</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <span style="padding:5px 12px;border:1px solid rgba(15,15,20,0.26);border-radius:4px;color:#85858E;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em">Mercado Público</span>
        <span style="padding:5px 12px;border:1px solid rgba(15,15,20,0.26);border-radius:4px;color:#85858E;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em">SIMEF</span>
        <span style="padding:5px 12px;border:1px solid rgba(15,15,20,0.26);border-radius:4px;color:#85858E;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em">Diario Oficial</span>
      </div>
    </div>
  </div>
</body></html>
